name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Describe what you want and why it helps.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      placeholder: "What problem are you trying to solve?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: "What should the tool do?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: "Any other approaches you considered?"
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - docs only
        - python pipeline
        - godot bridge script
        - github actions / ci
        - other
    validations:
      required: true
